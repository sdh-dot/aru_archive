<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aru Archive</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 10px;
      border-bottom: 1px solid #2a2a3e;
    }

    .header h1 { font-size: 15px; font-weight: 600; color: #c9b3ff; }

    #btn-ping {
      padding: 3px 8px;
      border: 1px solid #3a3a5a;
      border-radius: 4px;
      background: transparent;
      color: #b8b8d0;
      font-size: 11px;
      cursor: pointer;
    }
    #btn-ping:hover { border-color: #7c4dff; color: #c9b3ff; }

    .content { padding: 14px 16px; }

    #artwork-info {
      font-size: 11px;
      color: #7878a0;
      min-height: 16px;
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #status-msg {
      font-size: 12px;
      color: #9e9e9e;
      min-height: 18px;
      margin-bottom: 12px;
    }
    #status-msg.error   { color: #f44336; }
    #status-msg.success { color: #4caf50; }
    #status-msg.running { color: #ff9800; }
    #status-msg.warning { color: #ffc107; }

    #btn-save {
      width: 100%;
      padding: 9px 0;
      border: none;
      border-radius: 6px;
      background: #7c4dff;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #btn-save:hover:not(:disabled) { background: #6c3dea; }
    #btn-save:disabled { background: #3a3a5a; color: #666; cursor: not-allowed; }

    .footer {
      padding: 8px 16px;
      border-top: 1px solid #2a2a3e;
      font-size: 11px;
      color: #555;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Aru Archive</h1>
    <button id="btn-ping" title="연결 테스트">연결 테스트</button>
  </div>

  <div class="content">
    <div id="artwork-info"></div>
    <div id="status-msg">현재 페이지를 확인 중...</div>
    <button id="btn-save" disabled>저장</button>
  </div>

  <div class="footer">v0.3.0</div>

  <script type="module" src="popup.js"></script>
</body>
</html>
